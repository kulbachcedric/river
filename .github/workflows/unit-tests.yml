name: unit-tests

on:
  pull_request:
    branches:
      - "*"
  push:
    branches:
      - main

jobs:
  run:
    strategy:
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.12"]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v3

      - name: Build River
        uses: ./.github/actions/install-env
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache River datasets
        uses: actions/cache@v3
        with:
          path: ~/river_data
          key: ${{ runner.os }}

      - name: Cache scikit-learn datasets
        uses: actions/cache@v3
        with:
          path: ~/scikit_learn_data
          key: ${{ runner.os }}

      - name: Download datasets
        run: |
          poetry run python - <<'PY'
          import time
          import urllib.error
          import socket
          from river import datasets, bandit

          targets = [
              datasets.CreditCard(),
              datasets.Elec2(),
              datasets.SMSSpam(),
              bandit.datasets.NewsArticles(),
          ]

          for ds in targets:
              for attempt in range(1, 6):
                  try:
                      ds.download()
                      break
                  except (urllib.error.URLError, socket.gaierror) as exc:
                      if attempt == 5:
                          raise
                      time.sleep(10 * attempt)
          PY

      - name: pytest
        run: |
          poetry run pytest -m "not datasets" --durations=10 -n logical # Run pytest on all logical CPU cores
